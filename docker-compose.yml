services:
  minio:
    image: minio/minio:latest
    container_name: pifms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio-root-admin
      MINIO_ROOT_PASSWORD: minio-root-password-12345678
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: minio-root-admin
      MINIO_ROOT_PASSWORD: minio-root-password-12345678
      MINIO_APP_ACCESS_KEY: pifms-app
      MINIO_APP_SECRET_KEY: pifms-app-secret-12345678
      MINIO_SIGNATURE_BUCKET: pifms-signature-files
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$$MINIO_SIGNATURE_BUCKET"
        mc anonymous set none "local/$$MINIO_SIGNATURE_BUCKET"
        cat > /tmp/pifms-signature-policy.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:GetBucketLocation", "s3:ListBucket"],
              "Resource": ["arn:aws:s3:::$$MINIO_SIGNATURE_BUCKET"]
            },
            {
              "Effect": "Allow",
              "Action": ["s3:GetObject", "s3:PutObject"],
              "Resource": ["arn:aws:s3:::$$MINIO_SIGNATURE_BUCKET/*"]
            }
          ]
        }
        EOF
        mc admin user add local "$$MINIO_APP_ACCESS_KEY" "$$MINIO_APP_SECRET_KEY" || true
        mc admin policy create local pifms-signatures-rw /tmp/pifms-signature-policy.json || true
        mc admin policy attach local pifms-signatures-rw --user "$$MINIO_APP_ACCESS_KEY"

volumes:
  minio-data:
